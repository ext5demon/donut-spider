tests = [
    {
        name = "Test if collisions are executed sorted in object index order NOT in instance creation order"
        butterscotchArgs = ["object-index-iteration-test/data.win", "--headless", "--exit-at-frame", "1"]
        expectedStdoutOutput = [
            [
                "Game: start frame",
                "Game: colliding with wall 2",
                "Game: colliding with wall 1",
                "Game: colliding with wall 3"
            ]
        ]
    },
    {
        name = "Test Loritta and the Stars"
        butterscotchArgs = ["loritta-and-the-stars/data.win", "--playback-inputs", "loritta-and-the-stars/gameplay.json", "--exit-at-frame", "9000", "--screenshot-surfaces-at-frame", "9000", "--screenshot-surfaces", "loritta-and-the-stars/actual.%d.%d.png", "--headless"]
        expectedScreenshots = [
            {
                expected = "loritta-and-the-stars/expected.9000.0.png"
                actual = "loritta-and-the-stars/actual.9000.0.png"
            }
        ]
    },
    {
        name = "Test Undertale PT-BR (WinPack/TranslaTale WAD)"
